name: fitpulse
description: Fitness + Event Hybrid App with futuristic dark UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

  # State Management
  provider: ^6.1.1

  # UI & Animations
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # HTTP & API
  http: ^1.2.0

  # Icons & Fonts
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
